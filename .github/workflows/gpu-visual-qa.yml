name: GPU Visual QA

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Published Uptime Empire build to inspect
        required: false
        default: https://maloysius-wq.github.io/uptime-empire-play/
        type: string

permissions:
  contents: write

concurrency:
  group: uptime-empire-gpu-visual-qa
  cancel-in-progress: false

jobs:
  capture:
    runs-on: [self-hosted, windows, x64, gpu]
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture hardware-accelerated Chrome views
        shell: powershell
        env:
          UPTIME_QA_URL: ${{ inputs.target_url }}
          UPTIME_QA_HEADLESS: "0"
        run: node qa/capture-visuals.mjs
      - name: Upload visual QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uptime-empire-gpu-visual-qa
          path: qa-results
          if-no-files-found: warn
          retention-days: 14
      - name: Publish latest QA screenshots
        if: always()
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (!(Test-Path qa-results)) { exit 0 }
          if (!$env:GITHUB_TOKEN) { throw "GitHub Actions did not provide a repository token." }
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          Get-ChildItem -LiteralPath qa-results -File | ForEach-Object {
            $file = $_
            $path = [Uri]::EscapeDataString($file.Name)
            $uri = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/contents/qa-results/$path"
            $existing = $null
            try {
              $existing = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers -ErrorAction Stop
            } catch {
              $statusCode = $_.Exception.Response.StatusCode.value__
              if ($statusCode -ne 404) { throw }
            }
            $payload = @{
              message = "Publish GPU visual QA $($file.Name)"
              content = [Convert]::ToBase64String([IO.File]::ReadAllBytes($file.FullName))
              branch = $env:GITHUB_REF_NAME
            }
            if ($existing) { $payload.sha = $existing.sha }
            $body = $payload | ConvertTo-Json -Compress
            Invoke-RestMethod -Method Put -Uri $uri -Headers $headers -ContentType "application/json" -Body $body -ErrorAction Stop
          }
